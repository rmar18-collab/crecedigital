<svg xmlns="http://www.w3.org/2000/svg" width="920" height="400" viewBox="0 0 920 400">
  <defs>
    <radialGradient id="nucleo" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#B5D4F4"/>
      <stop offset="100%" stop-color="#185FA5"/>
    </radialGradient>
    <linearGradient id="cg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#0C447C"/>
      <stop offset="100%" stop-color="#185FA5"/>
    </linearGradient>
  </defs>

  <rect width="920" height="400" fill="white"/>

  <!-- ══ SÍMBOLO ══ -->
  <path d="M30,228 Q148,138 266,228" fill="none" stroke="#B5D4F4" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <path d="M52,250 Q148,163 244,250" fill="none" stroke="#85B7EB" stroke-width="2.2" stroke-linecap="round" opacity="0.55"/>
  <path d="M78,274 Q148,188 218,274" fill="none" stroke="#EF9F27" stroke-width="3"   stroke-linecap="round" opacity="0.72"/>
  <path d="M106,298 Q148,218 190,298" fill="none" stroke="#185FA5" stroke-width="4"  stroke-linecap="round" opacity="0.85"/>

  <!-- Núcleo -->
  <circle cx="148" cy="308" r="40" fill="#E6F1FB" stroke="#85B7EB" stroke-width="1" stroke-opacity="0.5"/>
  <circle cx="148" cy="308" r="29" fill="url(#nucleo)"/>
  <circle cx="148" cy="308" r="18" fill="#B5D4F4"/>
  <circle cx="148" cy="308" r="8"  fill="white"/>
  <circle cx="148" cy="300" r="5"  fill="#185FA5"/>
  <line x1="148" y1="305" x2="148" y2="318" stroke="#185FA5" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="148" y1="310" x2="140" y2="304" stroke="#185FA5" stroke-width="2"   stroke-linecap="round"/>
  <line x1="148" y1="310" x2="156" y2="304" stroke="#185FA5" stroke-width="2"   stroke-linecap="round"/>
  <line x1="148" y1="318" x2="141" y2="328" stroke="#185FA5" stroke-width="2"   stroke-linecap="round"/>
  <line x1="148" y1="318" x2="155" y2="328" stroke="#185FA5" stroke-width="2"   stroke-linecap="round"/>

  <!-- Satélites -->
  <circle cx="108" cy="288" r="12" fill="#EF9F27"/><circle cx="108" cy="288" r="6"  fill="#FAEEDA"/>
  <circle cx="188" cy="288" r="12" fill="#EF9F27"/><circle cx="188" cy="288" r="6"  fill="#FAEEDA"/>
  <circle cx="78"  cy="266" r="10" fill="#185FA5" opacity="0.85"/><circle cx="78"  cy="266" r="4.5" fill="#E6F1FB"/>
  <circle cx="218" cy="266" r="10" fill="#185FA5" opacity="0.85"/><circle cx="218" cy="266" r="4.5" fill="#E6F1FB"/>
  <circle cx="52"  cy="244" r="8.5" fill="#85B7EB" opacity="0.85"/><circle cx="52"  cy="244" r="4"  fill="#E6F1FB"/>
  <circle cx="244" cy="244" r="8.5" fill="#85B7EB" opacity="0.85"/><circle cx="244" cy="244" r="4"  fill="#E6F1FB"/>
  <line x1="148" y1="308" x2="108" y2="288" stroke="#EF9F27" stroke-width="1.6" opacity="0.6"/>
  <line x1="148" y1="308" x2="188" y2="288" stroke="#EF9F27" stroke-width="1.6" opacity="0.6"/>
  <line x1="148" y1="308" x2="78"  y2="266" stroke="#378ADD" stroke-width="1.3" opacity="0.4"/>
  <line x1="148" y1="308" x2="218" y2="266" stroke="#378ADD" stroke-width="1.3" opacity="0.4"/>
  <line x1="148" y1="308" x2="52"  y2="244" stroke="#85B7EB" stroke-width="1"   opacity="0.35"/>
  <line x1="148" y1="308" x2="244" y2="244" stroke="#85B7EB" stroke-width="1"   opacity="0.35"/>

  <!-- ══ WORDMARK ══
       Todas las letras con la MISMA baseline en y=330
       Cada letra crece en tamaño progresivo desde la base
       C=38px  r=50px  e=62px  c=74px  e=86px
       Esto crea el efecto escalón subiendo hacia arriba desde la misma base
  ══ -->

  <!-- C — paso 1, más pequeña -->
  <text x="310" y="330"
        font-family="'Helvetica Neue',Arial,sans-serif"
        font-weight="800" font-size="38"
        fill="#042C53">C</text>

  <!-- r — paso 2 -->
  <text x="337" y="330"
        font-family="'Helvetica Neue',Arial,sans-serif"
        font-weight="800" font-size="50"
        fill="#0C447C">r</text>

  <!-- e — paso 3 -->
  <text x="364" y="330"
        font-family="'Helvetica Neue',Arial,sans-serif"
        font-weight="800" font-size="62"
        fill="#185FA5">e</text>

  <!-- c — paso 4 -->
  <text x="404" y="330"
        font-family="'Helvetica Neue',Arial,sans-serif"
        font-weight="800" font-size="74"
        fill="#2272B8">c</text>

  <!-- e — paso 5, más grande, la cima -->
  <text x="451" y="330"
        font-family="'Helvetica Neue',Arial,sans-serif"
        font-weight="800" font-size="86"
        fill="#378ADD">e</text>

  <!-- ══ DIGITAL — misma baseline y=330, mayúsculas sostenidas ══ -->
  <!-- Sombra larga -->
  <text x="506" y="333"
        font-family="'Helvetica Neue',Arial,sans-serif"
        font-weight="900" font-size="86"
        fill="#042C53" opacity="0.14">DIGITAL</text>
  <text x="505" y="332"
        font-family="'Helvetica Neue',Arial,sans-serif"
        font-weight="900" font-size="86"
        fill="#042C53" opacity="0.18">DIGITAL</text>
  <text x="504" y="331"
        font-family="'Helvetica Neue',Arial,sans-serif"
        font-weight="900" font-size="86"
        fill="#042C53" opacity="0.20">DIGITAL</text>
  <!-- DIGITAL principal — misma baseline -->
  <text x="503" y="330"
        font-family="'Helvetica Neue',Arial,sans-serif"
        font-weight="900" font-size="86"
        fill="#0C447C">DIGITAL</text>

  <!-- ══ TAGLINE ══ -->
  <line x1="310" y1="348" x2="905" y2="348" stroke="#B5D4F4" stroke-width="0.8"/>
  <text x="312" y="370"
        font-family="'Helvetica Neue',Arial,sans-serif"
        font-size="14" fill="#888780" font-style="italic">
    Alianza por la Autonomía Digital Infantil en Latinoamérica
  </text>

</svg>
